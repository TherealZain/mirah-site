<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Email confirmed — Mirah</title>
<meta name="description" content="Your Mirah email address is confirmed.">
<style>
  :root {
    --rose: #b14d6a;
    --saffron: #e0a23c;
    --ink: #2a2421;
    --muted: #6b615a;
    --cream: #fbf7f2;
    --card: #ffffff;
    --line: #ece3d8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--cream);
    color: var(--ink);
    font: 18px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 96px 22px 80px; text-align: center; }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--rose); font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; font-size: 12px; margin-bottom: 22px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--saffron); }
  .check {
    width: 76px; height: 76px; border-radius: 50%;
    background: var(--rose); color: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 40px; line-height: 1; margin: 0 auto 26px;
  }
  h1 { font-size: 42px; line-height: 1.1; margin: 0 0 14px; letter-spacing: -.03em; }
  .tag { color: var(--muted); font-size: 20px; margin: 0 auto 36px; max-width: 460px; }
  .card-note {
    background: var(--card); border: 1px solid var(--line); border-radius: 16px;
    padding: 20px 24px; max-width: 430px; margin: 0 auto;
    color: var(--ink); font-size: 16px; line-height: 1.55;
  }
  .footer { margin-top: 56px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow"><span class="dot"></span> Mirah</div>
  <div class="check">&#10003;</div>
  <h1>Email confirmed</h1>
  <p class="tag">You&rsquo;re all set &mdash; your email address is verified.</p>
  <div class="card-note">
    Head back to the <strong>Mirah</strong> app on your iPhone and sign in with your email and password to start building your closet.
  </div>
  <div class="footer">&copy; 2026 Mirah</div>
</div>
</body>
</html>
