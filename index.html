<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mirah — AI Modest &amp; Cultural Closet</title>
<meta name="description" content="Mirah is an AI-powered digital closet and outfit planner built for Muslim and modest-fashion women.">
<style>
  :root {
    --rose: #b14d6a;
    --saffron: #e0a23c;
    --ink: #2a2421;
    --muted: #6b615a;
    --cream: #fbf7f2;
    --card: #ffffff;
    --line: #ece3d8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--cream);
    color: var(--ink);
    font: 18px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 96px 22px 80px; text-align: center; }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--rose); font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; font-size: 12px; margin-bottom: 18px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--saffron); }
  h1 { font-size: 46px; line-height: 1.1; margin: 0 0 14px; letter-spacing: -.03em; }
  .tag { color: var(--muted); font-size: 20px; margin: 0 auto 40px; max-width: 460px; }
  .links { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  .btn {
    display: inline-block; text-decoration: none; font-weight: 600;
    padding: 13px 26px; border-radius: 999px; border: 1px solid var(--line);
    background: var(--card); color: var(--ink);
  }
  .btn.primary { background: var(--rose); color: #fff; border-color: var(--rose); }
  .footer { margin-top: 64px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow"><span class="dot"></span> Mirah</div>
  <h1>Your closet, styled with intelligence.</h1>
  <p class="tag">An AI-powered digital closet and outfit planner built for Muslim and modest-fashion women &mdash; everyday Western wear and high-stakes cultural occasions alike.</p>
  <div class="links">
    <a class="btn primary" href="support.html">Support</a>
    <a class="btn" href="privacy.html">Privacy Policy</a>
  </div>
  <div class="footer">&copy; 2026 Mirah</div>
</div>
</body>
</html>
